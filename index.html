<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocos Magicos de Matematica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
  :root{
    --c1:#FF4C4C;--c2:#FF9500;--c3:#FFD700;--c4:#4CAF50;--c5:#00BCD4;--c6:#3F51B5;--c7:#9C27B0;--c8:#E91E63;--c9:#FF5722;--c10:#F44336;
    --bg:#0A0E2A;
    --card:#131A3A;
    --card2:#1A2245;
    --dark:#E8F0FF;
    --neon-cyan:#00F5FF;
    --neon-lime:#AAFF00;
    --neon-pink:#FF2D9B;
    --neon-gold:#FFD700;
    --neon-purple:#BF5FFF;
    --glow-cyan:0 0 12px #00F5FF,0 0 30px rgba(0,245,255,.3);
    --glow-pink:0 0 12px #FF2D9B,0 0 30px rgba(255,45,155,.3);
    --glow-lime:0 0 12px #AAFF00,0 0 30px rgba(170,255,0,.3);
    --glow-gold:0 0 12px #FFD700,0 0 30px rgba(255,215,0,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;}

  /* ── STAR FIELD ── */
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
  @keyframes shootingStar{0%{transform:translateX(0) translateY(0);opacity:1;}100%{transform:translateX(600px) translateY(200px);opacity:0;}}
  @keyframes nebulaDrift{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.05) rotate(3deg);}}

  body{
    font-family:'Nunito',sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
    position:relative;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(100,0,200,.55) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,80,200,.45) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 50% 80%, rgba(0,150,200,.3) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 70%, rgba(180,0,120,.3) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 90% 60%, rgba(100,200,50,.2) 0%, transparent 50%);
  }
  /* Animated nebula blobs */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(circle 300px at 15% 25%, rgba(120,0,255,.18) 0%, transparent 70%),
      radial-gradient(circle 250px at 85% 15%, rgba(0,200,255,.15) 0%, transparent 70%),
      radial-gradient(circle 200px at 70% 75%, rgba(255,50,150,.12) 0%, transparent 70%);
    animation:nebulaDrift 12s ease-in-out infinite;
  }
  /* Stars canvas overlay */
  #starsCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

  header{
    width:100%;
    background:linear-gradient(135deg,rgba(80,0,160,.9),rgba(0,80,200,.85),rgba(80,0,160,.9));
    padding:14px 24px 12px;
    text-align:center;
    box-shadow:0 4px 40px rgba(100,0,255,.5), 0 0 0 1px rgba(100,150,255,.2);
    position:relative;overflow:hidden;z-index:2;
    border-bottom:2px solid rgba(100,150,255,.3);
  }
  header::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,rgba(100,200,255,.06) 0,rgba(100,200,255,.06) 1px,transparent 1px,transparent 60px);
  }
  header::after{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,rgba(100,200,255,.04) 0,rgba(100,200,255,.04) 1px,transparent 1px,transparent 60px);
  }
  header h1{
    font-family:'Fredoka One',cursive;
    font-size:clamp(1.5rem,5vw,2.6rem);
    color:white;
    text-shadow:0 0 20px var(--neon-cyan),0 0 40px rgba(0,245,255,.5),3px 3px 0 rgba(0,0,0,.4);
    position:relative;letter-spacing:2px;z-index:1;
  }
  .stars-bar{display:flex;justify-content:center;margin-top:10px;position:relative;height:52px;z-index:1;}
  #starsSvg{overflow:visible;}
  .star-shape{transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
  .star-shape.earned{filter:drop-shadow(0 0 8px var(--neon-gold)) drop-shadow(0 0 20px rgba(255,215,0,.6));}
  .star-shape.pop{animation:starPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes starPop{0%{transform:scale(0) rotate(-25deg);}60%{transform:scale(1.35) rotate(8deg);}100%{transform:scale(1) rotate(0deg);}}

  .game-area{width:100%;max-width:700px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:22px;position:relative;z-index:2;}

  /* MODE BUTTONS */
  .mode-selector{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .mode-btn{
    font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 22px;
    border:2px solid rgba(100,150,255,.35);border-radius:50px;cursor:pointer;transition:all .2s;
    background:rgba(20,30,70,.8);
    color:#a0b8ff;
    box-shadow:0 4px 15px rgba(0,0,50,.4),inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
  }
  .mode-btn:hover{transform:translateY(-3px);border-color:var(--neon-cyan);color:var(--neon-cyan);box-shadow:var(--glow-cyan),0 8px 20px rgba(0,0,50,.5);}
  .mode-btn.active{transform:translateY(-2px);}
  .mode-btn:nth-child(1).active{background:rgba(255,45,60,.25);border-color:var(--c1);color:#fff;box-shadow:0 0 15px rgba(255,76,76,.5),0 5px 15px rgba(0,0,50,.4);}
  .mode-btn:nth-child(2).active{background:rgba(0,200,100,.2);border-color:#00E676;color:#fff;box-shadow:0 0 15px rgba(0,200,100,.5),0 5px 15px rgba(0,0,50,.4);}
  .mode-btn:nth-child(3).active{background:rgba(0,230,255,.2);border-color:var(--neon-cyan);color:#fff;box-shadow:var(--glow-cyan),0 5px 15px rgba(0,0,50,.4);}
  .mode-btn:nth-child(4).active{background:rgba(180,0,255,.25);border-color:var(--neon-purple);color:#fff;box-shadow:0 0 15px rgba(180,0,255,.5),0 5px 15px rgba(0,0,50,.4);}
  .mode-btn:nth-child(5).active{background:rgba(255,45,155,.25);border-color:var(--neon-pink);color:#fff;box-shadow:var(--glow-pink),0 5px 15px rgba(0,0,50,.4);}
  .mode-btn:nth-child(6).active{background:rgba(170,255,0,.2);border-color:var(--neon-lime);color:#fff;box-shadow:var(--glow-lime),0 5px 15px rgba(0,0,50,.4);}

  /* DIFFICULTY */
  .difficulty-bar{display:flex;gap:10px;justify-content:center;align-items:center;}
  .diff-label{font-family:'Fredoka One',cursive;font-size:.95rem;color:#6080CC;}
  .diff-btn{
    font-family:'Fredoka One',cursive;font-size:.95rem;padding:7px 20px;
    border:2px solid rgba(100,150,255,.3);border-radius:50px;cursor:pointer;transition:all .2s;
    background:rgba(20,30,70,.8);color:#8090bb;
    box-shadow:0 3px 12px rgba(0,0,50,.4);backdrop-filter:blur(8px);
  }
  .diff-btn.easy{color:#00E676;border-color:rgba(0,200,100,.4);}
  .diff-btn.easy.active{background:rgba(0,200,100,.2);color:white;border-color:#00E676;box-shadow:0 0 15px rgba(0,200,100,.5);}
  .diff-btn.hard{color:#FF4545;border-color:rgba(255,69,69,.4);}
  .diff-btn.hard.active{background:rgba(255,69,69,.2);color:white;border-color:#FF4545;box-shadow:0 0 15px rgba(255,69,69,.5);}
  .diff-btn:hover{transform:translateY(-1px);}

  /* ENGLISH MODE */
  .en-number-display{font-family:'Fredoka One',cursive;font-size:clamp(4rem,18vw,7rem);color:var(--neon-cyan);line-height:1;margin:10px 0 4px;text-shadow:var(--glow-cyan);}
  .en-question-hint{font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;color:#5060aa;margin-bottom:16px;}
  .en-answers-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:100%;max-width:500px;margin-top:4px;}
  .en-answer-btn{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.4rem);padding:18px 12px;border:2px solid rgba(100,150,255,.3);border-radius:18px;cursor:pointer;transition:all .15s;color:white;text-shadow:none;box-shadow:0 5px 0 rgba(0,0,0,.4),0 0 0 rgba(0,0,0,0);position:relative;top:0;letter-spacing:.5px;background:rgba(30,40,90,.9);backdrop-filter:blur(8px);}
  .en-answer-btn:active{top:4px;box-shadow:0 1px 0 rgba(0,0,0,.4);}
  .en-answer-btn:hover:not(:disabled){transform:translateY(-3px);filter:brightness(1.3);border-color:var(--neon-cyan);box-shadow:var(--glow-cyan),0 8px 0 rgba(0,0,0,.3);}
  .en-answer-btn.correct{animation:correctPulse .5s ease;background:rgba(0,200,100,.3)!important;border-color:#00E676!important;box-shadow:0 0 20px rgba(0,200,100,.6)!important;}
  .en-answer-btn.wrong{animation:wrongShake .4s ease;background:rgba(255,69,69,.3)!important;border-color:#FF4545!important;box-shadow:0 0 20px rgba(255,69,69,.6)!important;}

  /* PROGRESS */
  .progress-bar-wrap{
    width:100%;max-width:500px;
    background:rgba(255,255,255,.06);
    border-radius:50px;height:14px;overflow:hidden;
    border:1px solid rgba(100,150,255,.2);
    box-shadow:inset 0 2px 8px rgba(0,0,0,.3);
  }
  .progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--neon-purple),var(--neon-cyan),var(--neon-lime));
    background-size:200% 100%;
    animation:shimmerBar 2s linear infinite;
    border-radius:50px;transition:width .5s ease;
    box-shadow:0 0 12px rgba(0,245,255,.6);
  }
  @keyframes shimmerBar{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .score-display{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#6080CC;text-align:center;}

  /* QUESTION CARD */
  .question-card{
    background:rgba(16,22,55,.85);
    backdrop-filter:blur(16px);
    border-radius:28px;padding:30px 22px;width:100%;text-align:center;
    box-shadow:0 8px 40px rgba(0,0,50,.6),0 0 0 1px rgba(100,150,255,.15),inset 0 1px 0 rgba(255,255,255,.07);
    border:1px solid rgba(100,150,255,.2);
    position:relative;overflow:hidden;
  }
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple),var(--neon-cyan),var(--neon-lime),var(--neon-gold));box-shadow:0 0 15px rgba(100,200,255,.5);}
  .question-card::after{content:'';position:absolute;inset:0;border-radius:28px;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(100,150,255,.06) 0%,transparent 70%);pointer-events:none;}
  .question-text{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2.1rem);color:#C0D0FF;margin-bottom:18px;text-shadow:0 0 20px rgba(150,180,255,.4);}
  .blocks-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:6px 0 22px;min-height:80px;}
  .block-group{display:flex;gap:4px;}
  .block{width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.4rem;color:white;text-shadow:1px 1px 0 rgba(0,0,0,.4);box-shadow:0 4px 0 rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.25),0 0 15px rgba(255,255,255,.1);position:relative;animation:blockIn .35s ease backwards;cursor:pointer;user-select:none;transition:transform .15s;}
  .block:hover{transform:translateY(-4px) scale(1.06);filter:brightness(1.2);}
  .block::after{content:'';position:absolute;top:4px;left:6px;right:6px;height:10px;background:rgba(255,255,255,.25);border-radius:4px;}
  @keyframes blockIn{from{transform:translateY(-24px) scale(.6);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(0)}20%{transform:translateY(-12px) rotate(-9deg)}40%{transform:translateY(-16px) rotate(9deg)}60%{transform:translateY(-10px) rotate(-6deg)}80%{transform:translateY(-14px) rotate(6deg)}}
  @keyframes jump{0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}30%{transform:translateY(-18px) scaleX(.88) scaleY(1.12)}60%{transform:translateY(-8px) scaleX(1.06) scaleY(.94)}80%{transform:translateY(-4px)}}
  @keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
  @keyframes popAnim{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.95)}100%{transform:scale(1)}}
  @keyframes shakeAnim{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px) rotate(-5deg)}40%,80%{transform:translateX(7px) rotate(5deg)}}
  .anim-dance{animation:dance .75s ease !important;} .anim-jump{animation:jump .65s ease !important;} .anim-spin{animation:spin .65s ease !important;} .anim-pop{animation:popAnim .5s ease !important;} .anim-shake{animation:shakeAnim .5s ease !important;}
  .block-face{position:absolute;bottom:7px;display:flex;gap:5px;}
  .eye{width:8px;height:8px;background:white;border-radius:50%;border:1.5px solid rgba(0,0,0,.25);position:relative;}
  .eye::after{content:'';position:absolute;width:4px;height:4px;background:#333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
  .eye.happy::after{width:6px;height:3px;background:#333;border-radius:0 0 3px 3px;top:auto;bottom:1px;left:1px;transform:none;}
  .op-symbol{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--neon-cyan);padding:0 4px;line-height:1;text-shadow:var(--glow-cyan);}
  .equals-area{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--neon-gold);padding:0 4px;text-shadow:var(--glow-gold);}

  /* ANSWER BUTTONS */
  .answers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:500px;}
  .answer-btn{
    font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,4vw,1.8rem);
    padding:18px 8px;border:2px solid rgba(100,150,255,.25);border-radius:18px;
    cursor:pointer;transition:all .15s;
    color:#C0D0FF;
    text-shadow:none;
    box-shadow:0 5px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
    position:relative;top:0;
    background:rgba(25,35,80,.9);
    backdrop-filter:blur(8px);
  }
  .answer-btn:active{top:4px;box-shadow:0 1px 0 rgba(0,0,0,.5);}
  .answer-btn:hover:not(:disabled){transform:translateY(-3px);border-color:var(--neon-cyan);color:white;box-shadow:var(--glow-cyan),0 8px 0 rgba(0,0,0,.4);}
  .answer-btn.correct{animation:correctPulse .5s ease;background:rgba(0,200,100,.25)!important;border-color:#00E676!important;color:white!important;box-shadow:0 0 25px rgba(0,200,100,.7),0 5px 0 rgba(0,100,50,.5)!important;}
  .answer-btn.wrong{animation:wrongShake .4s ease;background:rgba(255,69,69,.25)!important;border-color:#FF4545!important;color:white!important;box-shadow:0 0 25px rgba(255,69,69,.7),0 5px 0 rgba(100,0,0,.5)!important;}
  @keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .feedback{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,5vw,1.7rem);min-height:2.2rem;transition:all .3s;text-align:center;}
  .feedback.correct{color:#00E676;text-shadow:0 0 15px rgba(0,200,100,.7);} .feedback.wrong{color:#FF4545;text-shadow:0 0 15px rgba(255,69,69,.7);}
  .next-btn{
    font-family:'Fredoka One',cursive;font-size:1.2rem;padding:15px 48px;
    background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));
    color:white;border:none;border-radius:50px;cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,50,.6),0 0 20px rgba(100,200,255,.4);
    transition:all .15s;display:none;
    text-shadow:0 0 10px rgba(255,255,255,.5);
    animation:bounceBut 1s infinite;
  }
  .next-btn.visible{display:block;}
  .next-btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,50,.6);}
  @keyframes bounceBut{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:99;}
  .confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  .celebration{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,12,35,.97);z-index:100;animation:fadeIn .3s;padding:24px;gap:16px;overflow-y:auto;}
  .celebration.show{display:flex;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .celebration h2{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,7vw,3.2rem);background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple),var(--neon-cyan),var(--neon-lime),var(--neon-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;animation:popCel .5s ease;white-space:pre-line;line-height:1.25;filter:drop-shadow(0 0 20px rgba(100,200,255,.4));}
  @keyframes popCel{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
  .cele-score{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#5060aa;}
  .trophies-section{width:100%;max-width:520px;}
  .trophies-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#6080cc;text-align:center;margin-bottom:12px;}
  .trophies-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .trophy-card{background:rgba(20,30,70,.9);backdrop-filter:blur(10px);border-radius:16px;padding:12px 14px;text-align:center;box-shadow:0 5px 18px rgba(0,0,50,.5);min-width:88px;max-width:110px;border:2px solid rgba(100,150,255,.2);animation:popCel .4s ease backwards;}
  .trophy-card.earned{border-color:var(--neon-gold);box-shadow:0 5px 20px rgba(255,215,0,.3),0 0 0 1px rgba(255,215,0,.1);} .trophy-card.locked{opacity:.2;filter:grayscale(1);}
  .trophy-icon{font-size:2rem;display:block;margin-bottom:5px;}
  .trophy-name{font-family:'Fredoka One',cursive;font-size:.85rem;color:#a0b8ff;line-height:1.2;}
  .trophy-label{font-family:'Nunito',sans-serif;font-size:.72rem;color:#5060aa;margin-top:2px;}
  .play-again-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:15px 52px;background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));color:white;border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,50,.6),0 0 20px rgba(200,50,255,.4);transition:transform .15s;margin-top:4px;text-shadow:0 0 10px rgba(255,255,255,.5);}
  .play-again-btn:hover{transform:scale(1.05);}

  /* NUMBERBLOCK REVEAL */
  .nb-reveal{position:fixed;inset:0;z-index:110;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,12,35,.97);animation:fadeIn .3s;padding:20px;gap:10px;overflow-y:auto;}
  .nb-reveal.show{display:flex;}
  .nb-praise{font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,5vw,2rem);color:var(--neon-lime);text-shadow:var(--glow-lime);}
  .nb-intro{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.3rem);color:#4050aa;margin-top:-4px;}
  .nb-name{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,7vw,2.8rem);background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple),var(--neon-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
  .nb-char{width:150px;height:auto;animation:popCel .55s cubic-bezier(.34,1.56,.64,1);}
  .nb-char svg{width:100%;height:auto;}
  .nb-continue-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:14px 44px;background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple));color:white;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,50,.6),0 0 20px rgba(0,200,255,.4);transition:transform .15s;margin-top:6px;animation:bounceBut 1s infinite;text-shadow:0 0 10px rgba(255,255,255,.5);}
  .nb-continue-btn:hover{transform:scale(1.05);}
  .english-badge{font-family:'Fredoka One',cursive;text-align:center;min-height:1.5rem;transition:all .4s;}
  .english-badge.visible{background:rgba(20,30,70,.9);border:2px solid var(--neon-gold);border-radius:18px;padding:10px 28px;animation:popCel .4s ease;box-shadow:0 0 20px rgba(255,215,0,.3);}
  .english-badge .en-label{font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;color:#5060aa;text-transform:uppercase;letter-spacing:.5px;}
  .english-badge .en-word{font-size:clamp(1.4rem,5vw,2rem);color:var(--neon-gold);text-shadow:var(--glow-gold);}

<script>
const COLORS=['#FF4C4C','#FF9500','#FFD700','#4CAF50','#00BCD4','#3F51B5','#9C27B0','#E91E63','#FF5722','#F44336'];
const ANIM_LIST=['anim-dance','anim-jump','anim-spin','anim-pop','anim-dance'];
const STAR_CX=[29,87,145,203,261];
const NB_NAMES={1:'Numero Um',2:'Numero Dois',3:'Numero Tres',4:'Numero Quatro',5:'Numero Cinco',6:'Numero Seis',7:'Numero Sete',8:'Numero Oito',9:'Numero Nove',10:'Numero Dez'};

const EN={0:'Zero',1:'One',2:'Two',3:'Three',4:'Four',5:'Five',6:'Six',7:'Seven',8:'Eight',9:'Nine',10:'Ten',11:'Eleven',12:'Twelve',13:'Thirteen',14:'Fourteen',15:'Fifteen',16:'Sixteen',17:'Seventeen',18:'Eighteen',19:'Nineteen',20:'Twenty',21:'Twenty-one',22:'Twenty-two',23:'Twenty-three',24:'Twenty-four',25:'Twenty-five',26:'Twenty-six',27:'Twenty-seven',28:'Twenty-eight',29:'Twenty-nine',30:'Thirty',31:'Thirty-one',32:'Thirty-two',33:'Thirty-three',34:'Thirty-four',35:'Thirty-five',36:'Thirty-six',37:'Thirty-seven',38:'Thirty-eight',39:'Thirty-nine',40:'Forty',41:'Forty-one',42:'Forty-two',43:'Forty-three',44:'Forty-four',45:'Forty-five',46:'Forty-six',47:'Forty-seven',48:'Forty-eight',49:'Forty-nine',50:'Fifty',51:'Fifty-one',52:'Fifty-two',53:'Fifty-three',54:'Fifty-four',55:'Fifty-five',56:'Fifty-six',57:'Fifty-seven',58:'Fifty-eight',59:'Fifty-nine',60:'Sixty',61:'Sixty-one',62:'Sixty-two',63:'Sixty-three',64:'Sixty-four',65:'Sixty-five',66:'Sixty-six',67:'Sixty-seven',68:'Sixty-eight',69:'Sixty-nine',70:'Seventy',71:'Seventy-one',72:'Seventy-two',73:'Seventy-three',74:'Seventy-four',75:'Seventy-five',76:'Seventy-six',77:'Seventy-seven',78:'Seventy-eight',79:'Seventy-nine',80:'Eighty',81:'Eighty-one',82:'Eighty-two',83:'Eighty-three',84:'Eighty-four',85:'Eighty-five',86:'Eighty-six',87:'Eighty-seven',88:'Eighty-eight',89:'Eighty-nine',90:'Ninety',91:'Ninety-one',92:'Ninety-two',93:'Ninety-three',94:'Ninety-four',95:'Ninety-five',96:'Ninety-six',97:'Ninety-seven',98:'Ninety-eight',99:'Ninety-nine',100:'One hundred'};
function toEnglish(n){return EN[n]||'';}

/* ─ STARS SVG ─ */
const SVG_NS='http://www.w3.org/2000/svg';
function starPoints(cx,cy,outerR,innerR,points){
  let d='';for(let i=0;i<points*2;i++){const a=(i*Math.PI/points)-Math.PI/2,r=i%2===0?outerR:innerR;d+=(i===0?'M':'L')+(cx+Math.cos(a)*r).toFixed(2)+','+(cy+Math.sin(a)*r).toFixed(2);}return d+'Z';
}
function buildStarEl(cx,cy,earned){
  const g=document.createElementNS(SVG_NS,'g');g.setAttribute('class','star-shape'+(earned?' earned':''));g.style.transformOrigin=cx+'px '+cy+'px';
  if(earned){
    const sh=document.createElementNS(SVG_NS,'ellipse');sh.setAttribute('cx',cx);sh.setAttribute('cy',cy+20);sh.setAttribute('rx',18);sh.setAttribute('ry',5);sh.setAttribute('fill','rgba(0,0,0,0.12)');g.appendChild(sh);
    const b=document.createElementNS(SVG_NS,'path');b.setAttribute('d',starPoints(cx,cy,22,9,5));b.setAttribute('fill','url(#starFill)');b.setAttribute('stroke','#000000');b.setAttribute('stroke-width','2.2');b.setAttribute('stroke-linejoin','round');g.appendChild(b);
    const s=document.createElementNS(SVG_NS,'path');s.setAttribute('d',starPoints(cx,cy-2,14,6,5));s.setAttribute('fill','url(#starSheen)');s.setAttribute('opacity','0.8');g.appendChild(s);
  }else{
    const b=document.createElementNS(SVG_NS,'path');b.setAttribute('d',starPoints(cx,cy,22,9,5));b.setAttribute('fill','rgba(255,255,255,0.12)');b.setAttribute('stroke','rgba(0,0,0,0.55)');b.setAttribute('stroke-width','2.2');b.setAttribute('stroke-linejoin','round');g.appendChild(b);
  }
  return g;
}
function updateStars(){
  const svg=document.getElementById('starsSvg');
  svg.querySelectorAll('.star-shape').forEach(n=>n.remove());
  STAR_CX.forEach((cx,i)=>svg.appendChild(buildStarEl(cx,26,i<stars)));
}
function popStar(idx){
  const s=document.getElementById('starsSvg').querySelectorAll('.star-shape');
  if(s[idx]){s[idx].classList.add('pop');setTimeout(()=>s[idx].classList.remove('pop'),500);}
}

/* ─ NUMBERBLOCK CHARACTER SVG GENERATOR ─ */
function f(v){return typeof v==='number'?v.toFixed(1):v;}

function starP(cx,cy,oR,iR,pts,fill,stroke){
  let d='';for(let i=0;i<pts*2;i++){const a=(i*Math.PI/pts)-Math.PI/2,r=i%2===0?oR:iR;d+=(i===0?'M':'L')+(cx+Math.cos(a)*r).toFixed(2)+','+(cy+Math.sin(a)*r).toFixed(2);}d+='Z';
  return `<path d="${d}" fill="${fill}"${stroke?` stroke="${stroke}" stroke-width="1.8"`:''}/>`;
}

function nbBlock(x,y,bs,fill,stroke){
  const sc=stroke||'rgba(0,0,0,0.2)';
  return `<rect x="${f(x)}" y="${f(y)}" width="${bs}" height="${bs}" rx="5" fill="${fill}" stroke="${sc}" stroke-width="1.8"/>
<rect x="${f(x+3)}" y="${f(y+3)}" width="${f(bs-6)}" height="${f(Math.min(bs*0.28,9))}" rx="3" fill="rgba(255,255,255,0.38)"/>`;
}

function nbEyes(fcx,fcy,bs,type,color){
  const p=[];
  if(type==='single'){
    const er=bs*0.23;
    p.push(`<circle cx="${fcx}" cy="${f(fcy)}" r="${f(er)}" fill="white"/>`);
    p.push(`<circle cx="${f(fcx+er*0.18)}" cy="${f(fcy+er*0.15)}" r="${f(er*0.58)}" fill="#222"/>`);
    p.push(`<circle cx="${f(fcx-er*0.2)}" cy="${f(fcy-er*0.2)}" r="${f(er*0.22)}" fill="white"/>`);
  } else if(type==='double'){
    const er=bs*0.17;
    [-1,1].forEach(side=>{
      const ex=fcx+side*bs*0.25;
      p.push(`<circle cx="${f(ex)}" cy="${f(fcy)}" r="${f(er)}" fill="white"/>`);
      p.push(`<circle cx="${f(ex+er*0.18)}" cy="${f(fcy+er*0.15)}" r="${f(er*0.58)}" fill="#222"/>`);
      p.push(`<circle cx="${f(ex-er*0.18)}" cy="${f(fcy-er*0.2)}" r="${f(er*0.22)}" fill="white"/>`);
    });
  } else if(type==='star'){
    const sr=bs*0.25;
    p.push(starP(fcx,fcy,sr,sr*0.42,5,'white',null));
    p.push(`<circle cx="${fcx}" cy="${f(fcy)}" r="${f(sr*0.3)}" fill="#222"/>`);
    p.push(`<circle cx="${f(fcx-sr*0.1)}" cy="${f(fcy-sr*0.1)}" r="${f(sr*0.11)}" fill="white"/>`);
  } else if(type==='stardbl'){
    const sr=bs*0.22;
    [-1,1].forEach(side=>{
      const ex=fcx+side*bs*0.27;
      p.push(starP(ex,fcy,sr,sr*0.42,5,'white','#FF4136'));
      p.push(`<circle cx="${f(ex)}" cy="${f(fcy)}" r="${f(sr*0.3)}" fill="#FF4136"/>`);
    });
  } else if(type==='sqbrow'){
    const er=bs*0.17;
    [-1,1].forEach(side=>{
      const ex=fcx+side*bs*0.25;
      p.push(`<rect x="${f(ex-er)}" y="${f(fcy-er)}" width="${f(er*2)}" height="${f(er*2)}" rx="2" fill="white"/>`);
      p.push(`<rect x="${f(ex-er*0.65)}" y="${f(fcy-er*0.65)}" width="${f(er*1.3)}" height="${f(er*1.3)}" rx="1" fill="#222"/>`);
      p.push(`<rect x="${f(ex-er*1.1)}" y="${f(fcy-er*1.8)}" width="${f(er*2.2)}" height="${f(er*0.55)}" rx="2" fill="#2E7D32"/>`);
    });
  } else if(type==='sqgrey'){
    const er=bs*0.17;
    [-1,1].forEach(side=>{
      const ex=fcx+side*bs*0.25;
      p.push(`<rect x="${f(ex-er)}" y="${f(fcy-er)}" width="${f(er*2)}" height="${f(er*2)}" rx="2" fill="white"/>`);
      p.push(`<rect x="${f(ex-er*0.65)}" y="${f(fcy-er*0.65)}" width="${f(er*1.3)}" height="${f(er*1.3)}" rx="1" fill="#555"/>`);
    });
  } else if(type==='dice'){
    const er=bs*0.18;
    [-1,1].forEach(side=>{
      const ex=fcx+side*bs*0.25;
      p.push(`<circle cx="${f(ex)}" cy="${f(fcy)}" r="${f(er*1.15)}" fill="white"/>`);
      p.push(`<circle cx="${f(ex)}" cy="${f(fcy)}" r="${f(er*0.58)}" fill="#CC0000"/>`);
    });
  }
  return p.join('');
}

function nbSVG(n){
  const cfgs={
    1: {cols:1,rows:1,bs:58,c:'#DE151D',lc:'#A01010',eye:'single'},
    2: {cols:1,rows:2,bs:44,c:'#E89223',lc:'#C06000',eye:'double',shoe:true},
    3: {cols:1,rows:3,bs:38,c:'#E6C40C',lc:'#C09000',eye:'double',hat:'jester'},
    4: {cols:2,rows:2,bs:36,c:'#38B500',lc:'#216600',eye:'sqbrow'},
    5: {cols:1,rows:5,bs:28,c:'#23B0DB',lc:'#0080A8',eye:'star',glove:true},
    6: {cols:2,rows:3,bs:30,c:'#3F51B5',lc:'#1A237E',eye:'dice',dots:true},
    7: {cols:1,rows:7,bs:22,cs:['#FF2200','#FF8800','#FFDD00','#00BB00','#0088FF','#7700CC','#EE00AA'],lc:'#660099',eye:'double'},
    8: {cols:2,rows:4,bs:26,c:'#E91E8C',lc:'#9C0060',eye:'double',tent:true,mask:true},
    9: {cols:3,rows:3,bs:24,cs:['#BDBDBD','#9E9E9E','#757575','#9E9E9E','#BDBDBD','#9E9E9E','#757575','#9E9E9E','#BDBDBD'],lc:'#616161',eye:'sqgrey'},
    10:{cols:2,rows:5,bs:22,c:'#F5F5F5',bc:'#FF4136',lc:'#FF4136',eye:'stardbl',hands:true},
  };
  const cfg=cfgs[n];if(!cfg)return '';
  const {cols,rows,bs,lc}=cfg;const gap=3;
  const bw=cols*bs+(cols-1)*gap,bh=rows*bs+(rows-1)*gap;
  const bx0=(120-bw)/2;
  const hatH=cfg.hat==='jester'?38:0;
  const by0=26+hatH;
  const legH=24,footH=12;
  const svgH=by0+bh+legH+footH+16;
  const p=[];

  // Numberling
  const nc=cfg.c||cfg.cs[0];
  p.push(`<text x="60" y="18" text-anchor="middle" font-family="Fredoka One,cursive" font-size="17" fill="${nc}" stroke="white" stroke-width="3" paint-order="stroke" font-weight="bold">${n}</text>`);

  // Jester hat (THREE)
  if(cfg.hat==='jester'){
    const hcx=60,hy=by0;
    p.push(`<polygon points="${hcx-15},${hy} ${hcx-20},${hy-30} ${hcx-4},${hy}" fill="#FF4136" stroke="#AA0000" stroke-width="1"/>`);
    p.push(`<polygon points="${hcx-4},${hy} ${hcx},${hy-34} ${hcx+4},${hy}" fill="#4CAF50" stroke="#1B5E20" stroke-width="1"/>`);
    p.push(`<polygon points="${hcx+4},${hy} ${hcx+20},${hy-30} ${hcx+15},${hy}" fill="#3F51B5" stroke="#1A237E" stroke-width="1"/>`);
    p.push(`<circle cx="${hcx-20}" cy="${hy-30}" r="4.5" fill="#FFD700" stroke="#E65C00" stroke-width="1"/>`);
    p.push(`<circle cx="${hcx}" cy="${hy-34}" r="4.5" fill="#FF4136" stroke="#AA0000" stroke-width="1"/>`);
    p.push(`<circle cx="${hcx+20}" cy="${hy-30}" r="4.5" fill="#4CAF50" stroke="#1B5E20" stroke-width="1"/>`);
  }

  // Superhero mask (EIGHT)
  if(cfg.mask){
    const mx=60,my=by0+bs*0.3;
    p.push(starP(mx,my,bs*0.72,bs*0.44,8,'rgba(255,20,120,0.35)',null));
  }

  // Draw blocks
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const x=bx0+c*(bs+gap),y=by0+r*(bs+gap);
      const fill=cfg.cs?cfg.cs[idx%cfg.cs.length]:cfg.c;
      const stroke=cfg.bc||'rgba(0,0,0,0.22)';
      p.push(nbBlock(x,y,bs,fill,stroke));
      // SIX: periwinkle dots on each block
      if(cfg.dots){
        p.push(`<circle cx="${f(x+bs*0.5)}" cy="${f(y+bs*0.65)}" r="${f(bs*0.14)}" fill="#7B86E2" opacity="0.7"/>`);
      }
      // SEVEN: rainbow hair stripes on top block
      if(n===7&&r===0){
        const colors=['#FF2200','#FF8800','#FFDD00','#00BB00','#0088FF','#7700CC','#EE00AA'];
        const sw=3,sh=14;
        for(let s=0;s<7;s++){
          const sx=x+4+s*(sw+1);
          p.push(`<rect x="${f(sx)}" y="${f(y-sh)}" width="${sw}" height="${sh}" rx="1.5" fill="${colors[s]}"/>`);
        }
      }
    }
  }

  // Face center (top block)
  const fcx=60,fcy=by0+bs*0.42,smileY=by0+bs*0.72;
  p.push(nbEyes(fcx,fcy,bs,cfg.eye,cfg.c));
  // Smile
  const sw2=bs*0.23;
  p.push(`<path d="M${f(fcx-sw2)},${f(smileY)} Q${fcx},${f(smileY+bs*0.14)} ${f(fcx+sw2)},${f(smileY)}" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>`);

  // Arms
  const armY=by0+bs*0.48,armW=14,armH=8;
  p.push(`<rect x="${f(bx0-armW-2)}" y="${f(armY-armH/2)}" width="${armW}" height="${armH}" rx="4" fill="${lc}"/>`);
  if(!cfg.glove&&!cfg.hands){
    p.push(`<rect x="${f(bx0+bw+2)}" y="${f(armY-armH/2)}" width="${armW}" height="${armH}" rx="4" fill="${lc}"/>`);
  }
  // Glove (FIVE)
  if(cfg.glove){
    p.push(`<rect x="${f(bx0+bw+2)}" y="${f(armY-armH/2)}" width="${armW}" height="${armH}" rx="4" fill="${lc}"/>`);
    p.push(`<circle cx="${f(bx0+bw+armW+10)}" cy="${f(armY)}" r="10" fill="#0097A7" stroke="${lc}" stroke-width="1.8"/>`);
    // Five fingers
    for(let fi=0;fi<5;fi++){
      const angle=(fi-2)*0.3;
      const fx2=bx0+bw+armW+10+Math.cos(angle-Math.PI/2)*12;
      const fy2=armY+Math.sin(angle-Math.PI/2)*12;
      p.push(`<circle cx="${f(fx2)}" cy="${f(fy2)}" r="3" fill="#00ACC1" stroke="${lc}" stroke-width="1"/>`);
    }
  }
  // Hands (TEN)
  if(cfg.hands){
    p.push(`<rect x="${f(bx0+bw+2)}" y="${f(armY-armH/2)}" width="${armW}" height="${armH}" rx="4" fill="${lc}"/>`);
    p.push(`<rect x="${f(bx0+bw+armW)}" y="${f(armY-12)}" width="15" height="20" rx="7" fill="white" stroke="${lc}" stroke-width="1.8"/>`);
    for(let fi=0;fi<5;fi++){
      const fx2=bx0+bw+armW+3+fi*2.4;
      p.push(`<circle cx="${f(fx2)}" cy="${f(armY-12)}" r="2.2" fill="white" stroke="${lc}" stroke-width="1"/>`);
    }
  }
  // Tentacles (EIGHT)
  if(cfg.tent){
    const ty=by0+bh*0.55;
    for(let t=0;t<4;t++){
      const tx=bx0-3-t*2;
      p.push(`<path d="M${f(tx)},${f(ty)} Q${f(tx-14)},${f(ty+16)} ${f(tx-3)},${f(ty+34)}" fill="none" stroke="${lc}" stroke-width="3.5" stroke-linecap="round"/>`);
    }
    for(let t=0;t<4;t++){
      const tx=bx0+bw+3+t*2;
      p.push(`<path d="M${f(tx)},${f(ty)} Q${f(tx+14)},${f(ty+16)} ${f(tx+3)},${f(ty+34)}" fill="none" stroke="${lc}" stroke-width="3.5" stroke-linecap="round"/>`);
    }
  }
  // Dancing shoes (TWO)
  if(cfg.shoe){
    const sy=by0+bh+legH+6;
    p.push(`<ellipse cx="${f(bx0+bw*0.25)}" cy="${sy}" rx="13" ry="7" fill="#1565C0" stroke="#0D47A1" stroke-width="1.2"/>`);
    p.push(`<ellipse cx="${f(bx0+bw*0.75)}" cy="${sy}" rx="13" ry="7" fill="#1565C0" stroke="#0D47A1" stroke-width="1.2"/>`);
  }
  // Legs
  const legY=by0+bh;
  const legW=Math.max(8,bs*0.22);
  const l1x=bx0+bw*0.22,l2x=bx0+bw*0.64;
  p.push(`<rect x="${f(l1x)}" y="${legY}" width="${f(legW)}" height="${legH}" rx="${f(legW/2)}" fill="${lc}"/>`);
  p.push(`<rect x="${f(l2x)}" y="${legY}" width="${f(legW)}" height="${legH}" rx="${f(legW/2)}" fill="${lc}"/>`);
  // Feet (if no shoes)
  if(!cfg.shoe){
    const fy=legY+legH+3;
    p.push(`<ellipse cx="${f(l1x+legW/2)}" cy="${fy}" rx="${f(legW*1.5)}" ry="${f(legW*0.72)}" fill="${lc}"/>`);
    p.push(`<ellipse cx="${f(l2x+legW/2)}" cy="${fy}" rx="${f(legW*1.5)}" ry="${f(legW*0.72)}" fill="${lc}"/>`);
  }

  return `<svg viewBox="0 0 120 ${Math.ceil(svgH)}" xmlns="http://www.w3.org/2000/svg">${p.join('')}</svg>`;
}

/* ─ TROPHIES ─ */
const ALL_TROPHIES=[
  {id:'first',icon:'1',name:'Primeira Estrela',  label:'Acertou pela 1a vez!',   cond:s=>s.correct>=1},
  {id:'three',icon:'3',name:'Otima Mira!',        label:'3 acertos seguidos',      cond:s=>s.streak>=3},
  {id:'all',  icon:'5',name:'Perfeito!',           label:'5 de 5 certas!',          cond:s=>s.correct===5},
  {id:'fast', icon:'R',name:'Super Rapido!',       label:'Respondeu em menos de 3s',cond:s=>s.fastAnswer},
  {id:'count',icon:'C',name:'Mestre dos Blocos',  label:'Modo Contar',             cond:s=>s.mode==='count'},
  {id:'add',  icon:'+',name:'Mestre da Soma',     label:'Modo Somar',              cond:s=>s.mode==='add'},
  {id:'sub',  icon:'-',name:'Mestre da Subtracao',label:'Modo Subtrair',           cond:s=>s.mode==='sub'},
  {id:'mul',  icon:'x',name:'Mestre da Multiplicacao',label:'Modo Multiplicar',   cond:s=>s.mode==='mul'},
  {id:'div',  icon:'/',name:'Mestre da Divisao',  label:'Modo Dividir',            cond:s=>s.mode==='div'},
  {id:'eng',  icon:'E',name:'Mestre do Ingles',   label:'Modo Ingles',             cond:s=>s.mode==='eng'},
];

/* ─ STATE ─ */
let mode='count',currentQuestion={},score=0,questionNum=0;
const TOTAL=10;
let answered=false,stars=0,streak=0,correct=0,fastAnswer=false,questionStartTime=0;
let difficulty='easy';
let usedQuestions=new Set();

function setDiff(d){
  difficulty=d;
  document.getElementById('diffEasy').classList.toggle('active',d==='easy');
  document.getElementById('diffHard').classList.toggle('active',d==='hard');
  playClick();startGame();
}

/* ─ AUDIO ─ */
function playTone(f1,f2,f3){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[f1,0],[f2,.12],[f3,.24]].filter(x=>x[0]).forEach(([f,t])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.28,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);});}catch(e){}}
function playClick(){playTone(440,0,0);}
function playCorrect(){playTone(523,659,784);}
function playWrong(){playTone(300,220,0);}
function playCelebrate(){playTone(784,988,1174);}

/* ─ GAME ─ */
function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach((b,i)=>{b.classList.toggle('active',['count','add','sub','mul','div','eng'][i]===m);});playClick();startGame();}

function startGame(){
  score=0;questionNum=0;stars=0;streak=0;correct=0;fastAnswer=false;
  usedQuestions=new Set();
  document.getElementById('celebration').classList.remove('show');
  document.getElementById('nbReveal').classList.remove('show');
  document.getElementById('confettiContainer').innerHTML='';
  updateStars();nextQuestion();
}

function nextQuestion(){
  if(questionNum>=TOTAL){showCelebration();return;}
  questionNum++;answered=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('englishBadge').innerHTML='';
  document.getElementById('englishBadge').className='english-badge';
  document.getElementById('answersGrid').className='answers-grid';
  document.getElementById('nextBtn').classList.remove('visible');
  questionStartTime=Date.now();
  if(mode==='count')generateCountQ();else if(mode==='add')generateAddQ();else if(mode==='sub')generateSubQ();else if(mode==='mul')generateMulQ();else if(mode==='div')generateDivQ();else generateEngQ();
  updateScoreDisplay();
}

function generateCountQ(){
  let n,key,attempts=0;
  do{ n=rand(1,10); key=`count:${n}`; attempts++; }while(usedQuestions.has(key)&&attempts<50);
  usedQuestions.add(key);
  currentQuestion={answer:n};
  document.getElementById('questionText').textContent='Quantos blocos voce ve?';
  renderBlocks([[n]]);renderAnswers(n,1,20);
}

function generateAddQ(){
  let a,b,c,key,attempts=0;
  if(difficulty==='hard'){
    do{ a=rand(1,10);b=rand(1,10);c=rand(1,10); key=`add3:${a}+${b}+${c}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a+b+c};
    document.getElementById('questionText').textContent=`Quanto e ${a} + ${b} + ${c}?`;
    renderBlocksAdd3(a,b,c);
    renderAnswers(a+b+c,1,30);
  }else{
    do{ a=rand(1,10);b=rand(1,10); key=`add:${Math.min(a,b)}+${Math.max(a,b)}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a+b};
    document.getElementById('questionText').textContent=`Quanto e ${a} + ${b}?`;
    renderBlocks([[a],[b]],true);
    renderAnswers(a+b,1,20);
  }
}

function generateSubQ(){
  let a,b,c,key,attempts=0;
  if(difficulty==='hard'){
    do{
      a=rand(12,20); b=rand(1,Math.floor(a/2)); c=rand(1,a-b-1);
      key=`sub2:${a}-${b}-${c}`; attempts++;
    }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a-b-c};
    document.getElementById('questionText').textContent=`Quanto e ${a} - ${b} - ${c}?`;
    renderBlocksSub2(a,b,c);
    renderAnswers(a-b-c,0,20);
  }else{
    do{ b=rand(1,9);a=rand(b,10); key=`sub:${a}-${b}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a-b};
    document.getElementById('questionText').textContent=`Quanto e ${a} - ${b}?`;
    renderBlocksSub(a,b);
    renderAnswers(a-b,0,10);
  }
}

function generateMulQ(){
  let a,b,c,key,attempts=0;
  if(difficulty==='hard'){
    do{ a=rand(1,4);b=rand(1,4);c=rand(1,4); key=`mul3:${[a,b,c].sort().join('x')}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a*b*c};
    document.getElementById('questionText').textContent=`Quanto e ${a} x ${b} x ${c}?`;
    renderBlocksMul3(a,b,c);
    renderAnswers(a*b*c,1,64);
  }else{
    do{ a=rand(1,5);b=rand(1,5); key=`mul:${Math.min(a,b)}x${Math.max(a,b)}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:a*b};
    document.getElementById('questionText').textContent=`Quanto e ${a} x ${b}?`;
    renderBlocksMul(a,b);
    renderAnswers(a*b,1,25);
  }
}

function generateDivQ(){
  let quotient,d1,d2,dividend,key,attempts=0;
  if(difficulty==='hard'){
    do{
      quotient=rand(1,4); d1=rand(2,4); d2=rand(2,4);
      dividend=quotient*d1*d2;
      key=`div2:${dividend}/${d1}/${d2}`; attempts++;
    }while(usedQuestions.has(key)&&attempts<100);
    usedQuestions.add(key);
    currentQuestion={answer:quotient};
    document.getElementById('questionText').textContent=`Quanto e ${dividend} ÷ ${d1} ÷ ${d2}?`;
    renderBlocksDiv2(dividend,d1,d2,quotient);
    renderAnswers(quotient,1,10);
  }else{
    let divisor,dividend2,key2;
    do{ quotient=rand(1,5);divisor=rand(2,5);dividend2=quotient*divisor; key2=`div:${dividend2}/${divisor}`; attempts++; }while(usedQuestions.has(key2)&&attempts<100);
    usedQuestions.add(key2);
    currentQuestion={answer:quotient};
    document.getElementById('questionText').textContent=`Quanto e ${dividend2} ÷ ${divisor}?`;
    renderBlocksDiv(dividend2,divisor);
    renderAnswers(quotient,1,10);
  }
}

function generateEngQ(){
  let n,key,attempts=0;
  do{ n=rand(1,100); key=`eng:${n}`; attempts++; }while(usedQuestions.has(key)&&attempts<100);
  usedQuestions.add(key);
  currentQuestion={answer:n,isEng:true};
  const card=document.getElementById('blocksRow');
  card.innerHTML=`<div class="en-number-display">${n}</div>`;
  document.getElementById('questionText').textContent='Como se escreve este numero em ingles?';
  renderEngAnswers(n);
}

/* ─ ENGLISH ANSWERS ─ */
function renderEngAnswers(correct){
  // hide normal answers grid, use english grid
  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  grid.className='en-answers-grid';

  // generate 3 wrong options: nearby numbers
  const opts=new Set([correct]);
  let att=0;
  while(opts.size<4&&att<300){
    const v=Math.max(1,Math.min(100,correct+rand(-15,15)));
    if(v!==correct&&!opts.has(v))opts.add(v);
    att++;
  }
  for(let i=1;i<=100&&opts.size<4;i++)if(!opts.has(i))opts.add(i);

  const EN_BTNCOLS=['#5C6BC0','#26A69A','#8D6E63','#546E7A'];
  shuffle([...opts].slice(0,4)).forEach((val,i)=>{
    const btn=document.createElement('button');
    btn.className='en-answer-btn';
    btn.textContent=toEnglish(val);
    const bc=EN_BTNCOLS[i%EN_BTNCOLS.length];
    btn.style.background=bc;btn.style.boxShadow=`0 5px 0 ${darken(bc)}`;
    btn.onclick=()=>checkEngAnswer(val,btn,correct);
    grid.appendChild(btn);
  });
}

function checkEngAnswer(val,btn,correctNum){
  if(answered)return;answered=true;
  const elapsed=(Date.now()-questionStartTime)/1000;if(elapsed<=3)fastAnswer=true;
  document.querySelectorAll('.en-answer-btn').forEach(b=>b.disabled=true);
  if(val===correctNum){
    btn.classList.add('correct');score+=10;streak++;correct++;
    const prev=stars;stars=Math.min(stars+1,5);updateStars();
    if(stars>prev)setTimeout(()=>popStar(stars-1),100);
    playCorrect();spawnMiniConfetti(btn);
    const praises=['Muito bem!','Incrivel!','Arrasou!','Perfeito!','Continue assim!'];
    showFeedback(praises[rand(0,praises.length-1)],'correct');
    updateScoreDisplay();
    setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),700);
  }else{
    btn.classList.add('wrong');streak=0;
    document.querySelectorAll('.en-answer-btn').forEach(b=>{if(b.textContent===toEnglish(correctNum))b.classList.add('correct');});
    playWrong();
    showFeedback(`A resposta era: ${toEnglish(correctNum)}`,'wrong');
    updateScoreDisplay();
    setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),700);
  }
}
/* ─ ADD HARD: 3 groups of real countable blocks ─ */
function renderBlocksAdd3(a,b,c){
  const row=document.getElementById('blocksRow');
  row.innerHTML='';
  row.style.flexDirection='column';
  row.style.gap='10px';

  const hint=document.createElement('div');
  hint.style.cssText='font-family:"Fredoka One",cursive;font-size:.9rem;color:#7090cc;text-align:center;';
  hint.textContent='Conte cada grupo e some tudo! 🔢';
  row.appendChild(hint);

  const groupsWrap=document.createElement('div');
  groupsWrap.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px;';

  const groupColors=['#FF4C4C','#4CAF50','#00BCD4'];
  const vals=[a,b,c];
  let runTotal=0;

  vals.forEach((n,gi)=>{
    if(gi>0){
      const sep=document.createElement('div');sep.className='op-symbol';sep.textContent='+';groupsWrap.appendChild(sep);
    }
    const wrap=document.createElement('div');
    wrap.style.cssText=`display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:2px solid ${groupColors[gi]}55;border-radius:12px;padding:6px 8px;`;
    const glabel=document.createElement('div');
    glabel.style.cssText=`font-family:'Fredoka One',cursive;font-size:.7rem;color:${groupColors[gi]};margin-bottom:2px;`;
    glabel.textContent=`${n} bloco${n>1?'s':''}`;
    wrap.appendChild(glabel);
    const brow=document.createElement('div');
    brow.style.cssText='display:flex;flex-wrap:wrap;gap:4px;justify-content:center;';
    for(let i=0;i<n;i++){
      const block=document.createElement('div');block.className='block';
      block.style.background=groupColors[gi];
      block.style.animationDelay=`${(gi*10+i)*0.06}s`;
      addFace(block);
      block.addEventListener('click',()=>{playClick();animBlock(block);});
      brow.appendChild(block);
    }
    wrap.appendChild(brow);
    groupsWrap.appendChild(wrap);
    runTotal+=n;
  });

  row.appendChild(groupsWrap);

  const eq=document.createElement('div');eq.className='equals-area';eq.textContent='=';
  row.appendChild(eq);
  const q=document.createElement('div');q.style.cssText="font-family:'Fredoka One',cursive;font-size:3rem;color:#ccc;text-align:center;";q.textContent='?';
  row.appendChild(q);
}

/* ─ SUB HARD: 2-step interactive removal ─ */
function renderBlocksSub2(a,b,c){
  const row=document.getElementById('blocksRow');
  row.innerHTML='';
  row.style.flexDirection='column';
  row.style.gap='12px';

  // phase tracker: 0 = full, 1 = first removal done, 2 = both done
  let phase=0;

  const hint=document.createElement('div');
  hint.style.cssText='font-family:"Fredoka One",cursive;font-size:.9rem;color:#7090cc;text-align:center;';
  hint.textContent=`Comece com ${a} blocos, tire ${b} 🔴, depois tire mais ${c} 🔴`;
  row.appendChild(hint);

  const blockWrap=document.createElement('div');
  blockWrap.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;gap:5px;';

  const blocks=[];
  for(let i=0;i<a;i++){
    const block=document.createElement('div');block.className='block';
    block.style.background=COLORS[a-1];
    block.style.animationDelay=`${i*0.05}s`;
    addFace(block);
    block.addEventListener('click',()=>{playClick();animBlock(block);});
    blockWrap.appendChild(block);
    blocks.push(block);
  }
  row.appendChild(blockWrap);

  // running counter
  const counter=document.createElement('div');
  counter.style.cssText='font-family:"Fredoka One",cursive;font-size:1.4rem;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.5);text-align:center;';
  counter.textContent=`Sobrando: ${a}`;
  row.appendChild(counter);

  // action button
  const actionBtn=document.createElement('button');
  actionBtn.style.cssText=`font-family:'Fredoka One',cursive;font-size:1.05rem;padding:12px 28px;background:linear-gradient(135deg,#FF4545,#FF9500);color:white;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.4),0 0 18px rgba(255,100,50,.4);animation:bounceBut 1s infinite;text-shadow:0 0 8px rgba(255,255,255,.4);`;
  actionBtn.textContent=`❌ Tirar ${b} bloco${b>1?'s':''}`;
  row.appendChild(actionBtn);

  const skipBtn=document.createElement('button');
  skipBtn.style.cssText='font-family:"Fredoka One",cursive;font-size:.8rem;padding:6px 18px;background:transparent;color:#4a5a88;border:1.5px solid rgba(100,150,255,.25);border-radius:50px;cursor:pointer;';
  skipBtn.textContent='Já sei! ⚡';
  row.appendChild(skipBtn);

  function markRemove(start,count,color){
    for(let i=start;i<start+count;i++){
      blocks[i].style.background=color||'#b71c1c';
      blocks[i].style.opacity='0.45';
      blocks[i].style.boxShadow='0 4px 0 #7f0000';
      const x=document.createElement('div');
      x.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:rgba(255,255,255,.85);z-index:2;pointer-events:none;';
      x.textContent='✕';
      if(!blocks[i].querySelector('div[style*="inset"]')) blocks[i].appendChild(x);
    }
  }

  function doPhase(){
    if(phase===0){
      markRemove(a-b,b,'#b71c1c');
      counter.textContent=`Sobrando: ${a-b}`;
      counter.style.color='#FF9500';
      actionBtn.textContent=`❌ Tirar mais ${c} bloco${c>1?'s':''}`;
      phase=1; playClick();
    } else if(phase===1){
      markRemove(a-b-c,c,'#7b0000');
      counter.textContent=`Sobrando: ${a-b-c} — agora escolha!`;
      counter.style.color='#00E676';
      counter.style.fontSize='1.7rem';
      actionBtn.style.animation='none';
      actionBtn.style.background='linear-gradient(135deg,#00E676,#00BCD4)';
      actionBtn.textContent=`✅ Restam ${a-b-c}! Escolha a resposta`;
      actionBtn.style.cursor='default';
      actionBtn.onclick=null;
      skipBtn.style.display='none';
      phase=2;
      setTimeout(()=>document.getElementById('answersGrid').scrollIntoView({behavior:'smooth',block:'nearest'}),400);
    }
  }

  function skipAll(){
    if(phase===0){doPhase();}
    if(phase===1){doPhase();}
  }

  actionBtn.onclick=doPhase;
  skipBtn.onclick=skipAll;
}

/* ─ MUL HARD: 2-phase interactive — build a×b then ×c ─ */
function renderBlocksMul3(a,b,c){
  const row=document.getElementById('blocksRow');
  row.innerHTML='';
  row.style.flexDirection='column';
  row.style.gap='12px';

  const phaseLabel=document.createElement('div');
  phaseLabel.style.cssText='font-family:"Fredoka One",cursive;font-size:1rem;color:#BF5FFF;text-align:center;text-shadow:0 0 12px rgba(191,95,255,.5);';
  phaseLabel.textContent=`Fase 1 de 2 — Monte ${a} × ${b}`;
  row.appendChild(phaseLabel);

  const groupsWrap=document.createElement('div');
  groupsWrap.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;min-height:68px;';
  row.appendChild(groupsWrap);

  const totalBar=document.createElement('div');
  totalBar.style.cssText='font-family:"Fredoka One",cursive;font-size:1.5rem;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.6);text-align:center;min-height:2rem;transition:all .3s;';
  totalBar.textContent='Total: 0';
  row.appendChild(totalBar);

  const actionBtn=document.createElement('button');
  actionBtn.style.cssText='font-family:"Fredoka One",cursive;font-size:1.05rem;padding:12px 28px;background:linear-gradient(135deg,#BF5FFF,#00F5FF);color:white;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,80,.5),0 0 18px rgba(100,200,255,.35);animation:bounceBut 1s infinite;text-shadow:0 0 8px rgba(255,255,255,.4);';
  actionBtn.textContent=`➕ Adicionar grupo 1 de ${b}`;
  row.appendChild(actionBtn);

  const skipBtn=document.createElement('button');
  skipBtn.style.cssText='font-family:"Fredoka One",cursive;font-size:.8rem;padding:6px 18px;background:transparent;color:#4a5a88;border:1.5px solid rgba(100,150,255,.25);border-radius:50px;cursor:pointer;';
  skipBtn.textContent='Já sei! ⚡';
  row.appendChild(skipBtn);

  const colors1=['#FF4C4C','#FF9500','#FFD700','#4CAF50'];
  const colors2=['#00BCD4','#9C27B0','#E91E63','#3F51B5'];
  let phase1Done=0, phase=1, phase2Done=0;
  let firstResult=a*b;

  function addGroup1(){
    if(phase1Done>=b||phase!==1) return;
    if(phase1Done>0){const sep=document.createElement('div');sep.className='op-symbol';sep.textContent='+';groupsWrap.appendChild(sep);}
    const grp=document.createElement('div');
    grp.style.cssText=`display:flex;flex-wrap:wrap;gap:4px;background:rgba(255,255,255,.04);border:2px solid ${colors1[phase1Done%4]}55;border-radius:10px;padding:5px 7px;animation:blockIn .35s ease;`;
    const gl=document.createElement('div');
    gl.style.cssText=`width:100%;text-align:center;font-family:'Fredoka One',cursive;font-size:.65rem;color:${colors1[phase1Done%4]};margin-bottom:2px;`;
    gl.textContent=`G${phase1Done+1}`;grp.appendChild(gl);
    for(let i=0;i<a;i++){
      const block=document.createElement('div');block.className='block';
      block.style.background=colors1[phase1Done%4];
      block.style.animationDelay=`${i*0.06}s`;
      addFace(block);
      block.addEventListener('click',()=>{playClick();animBlock(block);});
      grp.appendChild(block);
    }
    groupsWrap.appendChild(grp);
    phase1Done++;
    const cur=phase1Done*a;
    totalBar.style.transform='scale(1.15)';totalBar.style.color='#00F5FF';
    setTimeout(()=>{totalBar.style.transform='scale(1)';totalBar.style.color='#FFD700';},280);
    totalBar.textContent=`Total: ${cur}`;
    playClick();

    if(phase1Done>=b){
      // Transition to phase 2
      setTimeout(()=>{
        phaseLabel.textContent=`Fase 2 de 2 — Agora multiplique ${firstResult} × ${c}`;
        phaseLabel.style.color='#00F5FF';
        phaseLabel.style.textShadow='0 0 12px rgba(0,245,255,.5)';
        groupsWrap.innerHTML='';
        totalBar.textContent=`${firstResult} × ${c} = ?`;
        totalBar.style.color='#BF5FFF';
        actionBtn.textContent=`➕ Adicionar grupo 1 de ${c}`;
        phase=2; phase2Done=0;
      },700);
    } else {
      actionBtn.textContent=`➕ Adicionar grupo ${phase1Done+1} de ${b}`;
    }
  }

  function addGroup2(){
    if(phase2Done>=c||phase!==2) return;
    if(phase2Done>0){const sep=document.createElement('div');sep.className='op-symbol';sep.textContent='+';groupsWrap.appendChild(sep);}
    const grp=document.createElement('div');
    grp.style.cssText=`display:flex;flex-wrap:wrap;gap:4px;background:rgba(255,255,255,.04);border:2px solid ${colors2[phase2Done%4]}55;border-radius:10px;padding:5px 7px;animation:blockIn .35s ease;`;
    const gl=document.createElement('div');
    gl.style.cssText=`width:100%;text-align:center;font-family:'Fredoka One',cursive;font-size:.65rem;color:${colors2[phase2Done%4]};margin-bottom:2px;`;
    gl.textContent=`G${phase2Done+1} (${firstResult})`;grp.appendChild(gl);
    for(let i=0;i<firstResult;i++){
      const block=document.createElement('div');block.className='block';
      block.style.background=colors2[phase2Done%4];
      block.style.width='28px';block.style.height='28px';
      block.style.fontSize='0.7rem';block.style.borderRadius='6px';
      block.style.animationDelay=`${i*0.04}s`;
      addFace(block);
      block.addEventListener('click',()=>{playClick();animBlock(block);});
      grp.appendChild(block);
    }
    groupsWrap.appendChild(grp);
    phase2Done++;
    const cur=phase2Done*firstResult;
    totalBar.style.transform='scale(1.15)';totalBar.style.color='#00F5FF';
    setTimeout(()=>{totalBar.style.transform='scale(1)';totalBar.style.color='#00E676';},280);
    totalBar.textContent=`Total: ${cur}`;
    playClick();

    if(phase2Done>=c){
      actionBtn.style.animation='none';
      actionBtn.style.background='linear-gradient(135deg,#00E676,#00BCD4)';
      actionBtn.textContent=`🎉 Total: ${a*b*c}! Escolha a resposta`;
      actionBtn.style.cursor='default'; actionBtn.onclick=null;
      skipBtn.style.display='none';
      totalBar.style.fontSize='2rem';totalBar.style.color='#00E676';
      setTimeout(()=>document.getElementById('answersGrid').scrollIntoView({behavior:'smooth',block:'nearest'}),400);
    } else {
      actionBtn.textContent=`➕ Adicionar grupo ${phase2Done+1} de ${c}`;
    }
  }

  function skipAll(){
    if(phase===1){ while(phase1Done<b) addGroup1(); }

  actionBtn.onclick=()=>{ if(phase===1) addGroup1(); else addGroup2(); };
  skipBtn.onclick=skipAll;
}

/* ─ ANSWERS ─ */
function renderAnswers(corr,min,max){
  const grid=document.getElementById('answersGrid');grid.innerHTML='';
  const BTNCOLS=['#5C6BC0','#26A69A','#8D6E63','#546E7A'];
  generateOptions(corr,min,max,4).forEach((val,i)=>{
    const btn=document.createElement('button');btn.className='answer-btn';btn.textContent=val;
    const bc=BTNCOLS[i%BTNCOLS.length];
    btn.style.background=bc;btn.style.boxShadow=`0 5px 0 ${darken(bc)}`;
    btn.onclick=()=>checkAnswer(val,btn);grid.appendChild(btn);
  });

function checkAnswer(val,btn){
  if(answered)return;answered=true;
  const elapsed=(Date.now()-questionStartTime)/1000;if(elapsed<=3)fastAnswer=true;
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  if(val===currentQuestion.answer){
    btn.classList.add('correct');score+=10;streak++;correct++;
    const prev=stars;stars=Math.min(stars+1,5);updateStars();
    if(stars>prev)setTimeout(()=>popStar(stars-1),100);
    playCorrect();spawnMiniConfetti(btn);
    document.querySelectorAll('.block').forEach((b,i)=>{
      setTimeout(()=>{b.classList.remove(...ANIM_LIST);b.classList.add(ANIM_LIST[i%ANIM_LIST.length]);b.querySelectorAll('.eye').forEach(e=>e.classList.add('happy'));setTimeout(()=>b.classList.remove(ANIM_LIST[i%ANIM_LIST.length]),850);},i*90);
    });
    const praises=['Muito bem!','Incrivel!','Arrasou!','Perfeito!','Continue assim!'];
    showFeedback(praises[rand(0,praises.length-1)],'correct');
    updateScoreDisplay();
    // Show Numberblock reveal for 1-10, otherwise show next button
    const ans=currentQuestion.answer;
    if(ans>=1&&ans<=10){setTimeout(()=>showNBReveal(ans,praises[rand(0,praises.length-1)]),900);}
    else{
      // show English word badge for numbers > 10
      const en=toEnglish(ans);
      if(en){
        setTimeout(()=>{
          const badge=document.getElementById('englishBadge');
          badge.innerHTML=`<div class="en-label">Em ingles</div><div class="en-word">${en}</div>`;
          badge.classList.add('visible');
        },600);
      }
      setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),700);
    }
  }else{
    btn.classList.add('wrong');streak=0;
    document.querySelectorAll('.answer-btn').forEach(b=>{if(parseInt(b.textContent)===currentQuestion.answer)b.classList.add('correct');});
    playWrong();showFeedback(`A resposta era ${currentQuestion.answer}. Tente de novo!`,'wrong');
    document.querySelectorAll('.block').forEach(b=>{b.classList.add('anim-shake');setTimeout(()=>b.classList.remove('anim-shake'),600);});
    updateScoreDisplay();
    setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),700);
  }
}

/* ─ UTILS ─ */
function showFeedback(msg,cls){const f=document.getElementById('feedback');f.textContent=msg;f.className='feedback '+cls;}
function generateOptions(corr,min,max,count){
  const s=new Set([corr]);
  const spread=Math.max(5,Math.round(corr*0.4));
  let att=0;
  while(s.size<count&&att<300){
    const delta=rand(-spread,spread);
    const v=Math.max(min,Math.min(max,corr+delta));
    if(v!==corr&&!s.has(v))s.add(v);
    att++;
  }
  // fallback: fill sequentially if needed
  for(let i=min;i<=max&&s.size<count;i++)if(!s.has(i))s.add(i);
  for(let i=max;i>=min&&s.size<count;i--)if(!s.has(i))s.add(i);
  return shuffle([...s].slice(0,count));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function darken(h){const n=parseInt(h.slice(1),16);return '#'+[n>>16,(n>>8)&0xff,n&0xff].map(v=>Math.max(0,v-40).toString(16).padStart(2,'0')).join('');}
function updateScoreDisplay(){document.getElementById('scoreDisplay').textContent=`Questao ${questionNum} de ${TOTAL} — Pontos: ${score}`;document.getElementById('progressBar').style.width=`${(questionNum/TOTAL)*100}%`;}
function launchConfetti(){const c=document.getElementById('confettiContainer');c.innerHTML='';for(let i=0;i<90;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${COLORS[~~(Math.random()*COLORS.length)]};animation-duration:${1.2+Math.random()*1.8}s;animation-delay:${Math.random()*.8}s;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'3px'};`;c.appendChild(p);}}
function spawnMiniConfetti(btn){const r=btn.getBoundingClientRect(),c=document.getElementById('confettiContainer');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${r.left+r.width/2+(Math.random()-.5)*80}px;top:${r.top}px;background:${COLORS[~~(Math.random()*COLORS.length)]};animation-duration:${.7+Math.random()*.6}s;width:8px;height:8px;border-radius:50%;position:fixed;`;c.appendChild(p);setTimeout(()=>p.remove(),1400);}}

/* ─ STAR FIELD ─ */
(function(){
  const canvas=document.getElementById('starsCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let stars=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  function initStars(){
    stars=[];
    const starColors=['#ffffff','#a0c8ff','#ffd0ff','#c0ffff','#ffffa0'];
    for(let i=0;i<240;i++){
      stars.push({
        x:Math.random()*canvas.width,y:Math.random()*canvas.height,
        r:Math.random()*1.8+.2,
        baseAlpha:Math.random()*.7+.15,
        twinkleSpeed:Math.random()*.025+.008,
        twinklePhase:Math.random()*Math.PI*2,
        color:starColors[Math.floor(Math.random()*starColors.length)]
      });
    }
  }
  function hexToRgb(h){const n=parseInt(h.slice(1),16);return`${n>>16},${(n>>8)&0xff},${n&0xff}`;}
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.twinklePhase+=s.twinkleSpeed;
      const a=s.baseAlpha*(0.4+0.6*Math.sin(s.twinklePhase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${hexToRgb(s.color)},${a})`;
      ctx.fill();
      if(s.r>1.2){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(${hexToRgb(s.color)},${a*.12})`;
        ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  resize();initStars();draw();
  window.addEventListener('resize',()=>{resize();initStars();});
})();

startGame();
</script>
